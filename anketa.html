<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Акции | Анкета</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #FFFFFF;
                font-family: 'SF Compact', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                color: #1e2a3a;
                display: flex;
                min-height: 100vh;
            }
            .sidebar {
                position: fixed;
                left: 0; top: 0;
                width: 280px;
                height: 100vh;
                background: linear-gradient(135deg, #0c8680, #139113);
                padding: 32px 20px;
                display: flex;
                flex-direction: column;
                gap: 20px; z-index: 100;
                border-right: 1px solid rgba(255,255,255,0.3);
            }
            .sidebar-logo {
                font-family: 'SF Pro', sans-serif;
                font-size: 1.6rem;
                font-weight: 600;
                color: white;
                text-align: center;
                margin-bottom: 30px;
            }
            .nav-drawer {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .nav-drawer a {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 20px;
                min-width: 180px;
                background: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(4px);
                border-radius: 60px;
                text-decoration: none;
                font-family: 'SF Compact', sans-serif;
                font-weight: 500;
                font-size: 16px;
                line-height: 1.2;
                text-decoration: none;
                color: #1e2a3a;
                border: 1px solid rgba(255,255,255,0.3);
                transition: all 0.25s ease;
            }
            .nav-drawer a i {
                width: 24px;
                color: white;
            }
            .nav-drawer a:hover {
                background: white;
                transform: translateX(6px);
            }
            .nav-drawer a:hover i {color: #0c8680;}
            .main-content {
                margin-left: 280px;
                flex: 1;
                padding: 40px 48px;
            }
            .gradient-card {
                background: linear-gradient(135deg, #0c8680, #139113);
                border-radius: 32px;
                padding: 30px;
            }
            .inner-white {
                background: rgba(255,255,255,0.94);
                border-radius: 24px;
                padding: 32px;
            }
            h1 {
                font-family: 'SF Pro', sans-serif;
                font-size: 2.4rem;
                background: linear-gradient(135deg, #0c8680, #139113);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                margin-bottom: 12px;
            }
            hr {
                margin: 20px 0;
                border: none;
                height: 2px;
                background: linear-gradient(90deg, #0c8680, #139113, transparent);
            }
            form {
                max-width: 600px;
                margin: 0 auto;
            }
            input, select, textarea {
                width: 100%;
                padding: 10px;
                margin: 8px 0 16px;
                border: 1px solid #ccc;
                border-radius: 12px;
                font-family: inherit;
                font-size: 1rem;
            }
            input[type="radio"], input[type="checkbox"] {
                width: auto;
                margin-right: 8px;
            }
            .form-group {margin-bottom: 20px;}
            button, input[type="submit"], input[type="reset"] {
                background: #0c8680;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 40px;
                cursor: pointer;
                font-size: 1rem;
                margin-right: 12px;
                transition: 0.2s;
            }
            input[type="submit"]:hover, input[type="reset"]:hover {background: #139113;}
            footer {
                margin-top: 40px;
                text-align: center;
                font-size: 0.8rem;
                color: #5a6e6b;
                border-top: 1px solid #e0e7e5;
                padding-top: 24px;
            }
            @media (max-width: 768px) {
                .sidebar {
                    width: 220px;
                    padding: 20px 12px;
                }
                .main-content {
                    margin-left: 220px;
                    padding: 20px 16px;
                }
                .inner-white {padding: 20px 16px;}
                h1 {
                    font-size: 1.6rem;
                    text-align: center;
                }
                h2 {font-size: 1.3rem;}
                p, li, dd, dt {font-size: 0.9rem;}
                .stock-img {
                    float: none;
                    display: block;
                    margin: 0 auto 20px auto;
                    width: 100%;
                    max-width: 100%;
                    height: auto;
                }
                table {
                    display: block;
                    overflow-x: auto;
                    white-space: nowrap;
                }
                input, select, textarea {
                    font-size: 16px;
                    padding: 10px;
                }
                input[type="submit"], input[type="reset"] {
                    width: 100%;
                    margin: 8px 0;
                }
                .nav-drawer a {
                    padding: 10px 12px;
                    font-size: 14px;
                    min-width: auto;
                }
                .nav-drawer a i {
                    font-size: 1rem;
                    width: 20px;
                }
                .menu-toggle {display: none;}
                .sidebar-logo {
                    font-size: 1.3rem;
                    margin-bottom: 20px;
                }
                dl {margin: 0;}
                dt {font-size: 1rem;}
                dd {margin-left: 16px;}
                ol, ul {margin-left: 20px;}
            }
        </style>
    </head>
    <body>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i> Invest
            </div>
            <div class="nav-drawer">
                <a href="index.html">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
                <a href="glossary.html">
                    <i class="fas fa-book-open"></i>
                    <span>Словарь</span>
                </a>
                <a href="hardware.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Аналитика</span>
                </a>
                <a href="anketa.html">
                    <i class="fas fa-pen-to-square"></i>
                    <span>Анкета</span>
                </a>
                <a href="software.html">
                    <i class="fas fa-lightbulb"></i>
                    <span>Стратегии</span>
                </a>
            </div>
        </div>
        <div class="main-content">
            <div class="gradient-card">
                <div class="inner-white">
                    <h1>Анкета инвестора</h1>
                    <hr>
                    <form>
                        <div class="form-group">
                            <label>Ваше имя:</label>
                            <input type="text" name="email" placeholder="Иванов Иван">
                        </div>
                        <div class="form-group">
                            <label>Email:</label>
                            <input type="email" name="emai;" placeholder="ivanov@example.com">
                        </div>
                        <div class="form-group">
                            <label>Опыт инвестирования:</label><br>
                            <input type="radio" name="exp" value="beginner">
                            Начинающий<br>
                            <input type="radio" name="exp" value="middle">
                            Опытный (1-3 года)<br>
                            <input type="radio" name="exp" value="pro">
                            Профессионал (более 3 лет)
                        </div>
                        <div class="form-group">
                            <label>Используемые сервисы:</label><br>
                            <input type="checkbox" name="service1" value="broker">
                            Брокерский счет<br>
                            <input type="checkbox" name="service2" value="etf">
                            ETF-фонды<br>
                            <input type="checkbox" name="service3" value="analytics">
                            Аналитические порталы
                        </div>
                        <div class="form-group">
                            <label>Предпочитаемый брокер:</label>
                            <select name="broker">
                                <option>Тинькофф Инвестиции</option>
                                <option>СберИнвестиции</option>
                                <option>БКС</option>
                                <option>ВТБ</option>
                            </select>
                            <div class="form-group">
                                <label>Ваши пожелания:</label>
                                <textarea name="comment" rows="4" placeholder="Что ещё вы хотели бы узнать?"></textarea>
                            </div>
                            <input type="submit" value="Отправить">
                            <input type="reset" value="Очистить">
                        </div>
                    </form>
                    <footer>
                        © 2026 Инвестиции в акции Konstantin Sborschikov
                    </footer>
                </div>
            </div>
        </div>
    </body>
</html>
